version: "2"

linters:
  enable:
    - bodyclose
    - copyloopvar
    - contextcheck
    - depguard
    - errorlint
    - forbidigo
    - gocognit
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nilerr
    #- noctx
    - nolintlint
    - perfsprint
    - prealloc
    - revive
    - thelper
    - paralleltest
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign

  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/pkg/errors
              desc: "use Go 1.13+ errors instead of pkg/errors"
            - pkg: math/rand$
              desc: "use math/rand/v2 instead"
    gocognit:
      min-complexity: 20
    gocyclo:
      min-complexity: 15
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    gosec:
      excludes:
        - G104  # unhandled errors are already reported by errcheck
    revive:
      enable-all-rules: false
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: comment-spacings
        - name: dot-imports
        - name: empty-block
        - name: empty-lines
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming

  exclusions:
    rules:
      # Security scanning targets production code; test fixtures routinely
      # contain credential-like literals and helper subprocess/file calls.
      - path: _test\.go$
        linters:
          - gosec
      # Test functions are naturally long and branchy (table-driven setups,
      # many subtests); complexity guardrails target production code.
      - path: _test\.go$
        linters:
          - gocognit
          - gocyclo
