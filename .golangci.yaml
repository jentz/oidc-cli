version: "2"

linters:
  enable:
    - bodyclose
    - copyloopvar
    - contextcheck
    - depguard
    - errorlint
    - forbidigo
    - gocognit
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nilerr
    #- noctx
    - nolintlint
    - perfsprint
    - prealloc
    - revive
    - thelper
    - paralleltest
    - tparallel
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - wastedassign

  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/pkg/errors
              desc: "use Go 1.13+ errors instead of pkg/errors"
            - pkg: math/rand$
              desc: "use math/rand/v2 instead"
    gocognit:
      min-complexity: 20
    gocyclo:
      min-complexity: 15
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    gosec:
      excludes:
        - G104  # unhandled errors are already reported by errcheck
    revive:
      enable-all-rules: false
      rules:
        - name: argument-limit
          arguments: [6]
        - name: atomic
        - name: blank-imports
        - name: bool-literal-in-expr
        - name: comment-spacings
        - name: confusing-naming
        - name: confusing-results
        - name: context-as-argument
        - name: context-keys-type
        - name: defer
        - name: dot-imports
        - name: duplicated-imports
        - name: early-return
        - name: empty-block
        - name: empty-lines
        - name: enforce-map-style
          arguments: [make]
        - name: enforce-slice-style
          arguments: [make]
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: flag-parameter
        - name: function-length
          arguments: [60, 0]
        - name: get-return
        - name: identical-branches
        - name: if-return
        - name: import-shadowing
        - name: increment-decrement
        - name: indent-error-flow
        - name: modifies-parameter
        - name: modifies-value-receiver
        - name: range
        - name: range-val-address
        - name: range-val-in-closure
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: redundant-import-alias
        - name: string-format
        - name: string-of-int
        - name: struct-tag
        - name: superfluous-else
        - name: time-equal
        - name: time-naming
        - name: unchecked-type-assertion
        - name: unexported-naming
        - name: unexported-return
        - name: unhandled-error
          arguments:
            # Writes to stdout/stderr and in-memory buffers are handled at the
            # call-site return, not inline, so their errors may be ignored.
            - fmt\.Print.*
            - fmt\.Fprint.*
            - bytes\.Buffer\.Write.*
            - strings\.Builder\.Write.*
            - io\.WriteString
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
        - name: unused-receiver
        - name: use-any
        - name: useless-break
        - name: var-declaration
        - name: var-naming
        - name: waitgroup-by-value

  exclusions:
    rules:
      # Security scanning targets production code; test fixtures routinely
      # contain credential-like literals and helper subprocess/file calls.
      - path: _test\.go$
        linters:
          - gosec
      # Test functions are naturally long and branchy (table-driven setups,
      # many subtests); complexity guardrails target production code.
      - path: _test\.go$
        linters:
          - gocognit
          - gocyclo
      # Length- and complexity-oriented checks target production code;
      # table-driven test fixtures make functions naturally long.
      - path: _test\.go$
        text: function-length|cognitive-complexity|cyclomatic|hugeParam|rangeValCopy
